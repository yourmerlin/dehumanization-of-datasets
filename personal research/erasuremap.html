<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICE Erasure Map</title>
</head>
<body>
<div id="wrap">
  <canvas id="mapCanvas"></canvas>
  <div id="ui">
    <div class="stat">immigrants who've been 'erased'</div>
    <div class="big" id="bigNum">0</div>
    <div class="sub" id="subLine">Oct 2022 — press play to begin</div>
    <div id="controls">
      <button id="playBtn">Play</button>
      <input type="range" id="timeline" min="0" max="41" value="0" step="1">
    </div>
    <div id="sparkWrap"><canvas id="spark"></canvas><div id="scrub"></div></div>
    <div class="labels"><span>Oct 2022</span><span>Jan 2024</span><span>Jan 2025</span><span>Mar 2026</span></div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script src="erasuremap.js"></script>
<script src="erasuremap.css"></script>
</body>
</html>
